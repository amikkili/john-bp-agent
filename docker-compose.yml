version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env          # loads all your secrets from .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app        # hot reload - code changes reflect immediately
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # Optional: local postgres for offline dev (uses Render DB in prod)
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: john_bp
      POSTGRES_USER: john_bp_user
      POSTGRES_PASSWORD: localpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: